spring:
  application:
    name: ${APP_NAME}

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 4
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
decorator:
  datasource:
    p6spy:
      enable-logging: true
      multiline: true
      logging: slf4j
      # 실제값 한 줄만 출력됨 이거 안하면 ? 쿼리하는 거까지 총 두 줄뜸
      log-format: "%(sql)"

# Logging
logging:
  level:
    root: ${LOG_LEVEL:INFO}

# CORS
cors:
  allowed-origins: ${CORS_ORIGINS}

# JWT
jwt:
  secret: ${JWT_SECRET}

# OAuth2 Redirect
oauth2:
  redirect:
    success-url: ${OAUTH2_SUCCESS_REDIRECT_URL:http://localhost:3000/oauth/callback}
    failure-url: ${OAUTH2_FAILURE_REDIRECT_URL:http://localhost:3000/oauth/error}

# Cookie
cookie:
  secure: ${COOKIE_SECURE:true}
  http-only: ${COOKIE_HTTP_ONLY:true}
  same-site: ${COOKIE_SAME_SITE:Lax}
  path: ${COOKIE_PATH:/}

# Springdoc OpenAPI
springdoc:
  swagger-ui:
    # Cookie 전송을 위한 withCredentials 활성화
    request-interceptor: >
      function(request) {
        request.credentials = 'include';
        return request;
      }
    # 인증된 API 테스트를 위한 설정
    persist-authorization: true
    try-it-out-enabled: true

# Swagger
swagger:
  base-url: ${SWAGGER_BASE_URL:http://localhost:8080}
