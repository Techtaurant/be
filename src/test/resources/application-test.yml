server:
  port: 0

app:
  default-post-thumbnail-url: /static/images/post-thumbnail.png
  default-user-thumbnail-url: /static/images/user-thumbnail.png

spring:
  application:
    name: TechTaurant Main API (Test)

  datasource:
    # Values provided by @DynamicPropertySource in IntegrationTest
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  jackson:
    time-zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    postgresql:
      transactional-lock: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope:
              - email
              - profile

decorator:
  datasource:
    p6spy:
      enable-logging: true
      multiline: true
      logging: slf4j
      log-format: "%(sql)"

logging:
  level:
    root: INFO
    com.techtaurant: DEBUG
    org.springframework.security: DEBUG
    org.springframework.test: DEBUG

cors:
  allowed-origins: http://localhost:3000,http://localhost:8000

jwt:
  secret: test-jwt-secret-key-minimum-256-bits-for-hs256-algorithm
  access-token-expire-ms: 3600000
  refresh-token-expire-ms: 604800000

oauth2:
  redirect:
    success-url: http://localhost:3000/oauth/callback
    failure-url: http://localhost:3000/oauth/error

cookie:
  secure: false
  http-only: true
  same-site: Lax
  path: /

otel:
  sdk:
    disabled: true
  traces:
    exporter: none
  metrics:
    exporter: none
  logs:
    exporter: none

springdoc:
  swagger-ui:
    request-interceptor: >
      function(request) {
        request.credentials = 'include';
        return request;
      }
    persist-authorization: true
    try-it-out-enabled: true

swagger:
  base-url: http://localhost:8080
