name: Test & Coverage Verification

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: techtaurant_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Run Tests & Generate Coverage Report
        working-directory: ./main-server
        run: |
          chmod +x gradlew
          ./gradlew test jacocoTestReport --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/techtaurant_test
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpass
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
          SPRING_PROFILES_ACTIVE: test

      - name: Verify Coverage Thresholds
        working-directory: ./main-server
        run: |
          chmod +x gradlew
          ./gradlew jacocoTestCoverageVerification --no-daemon

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: main-server/build/reports/jacoco/test/html/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: main-server/build/test-results/
          retention-days: 30

      - name: Comment PR with Coverage Report Link
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const coverageReportPath = './main-server/build/reports/jacoco/test/html/index.html';

            let comment = '## 📊 Test Coverage Report\n\n';

            if (fs.existsSync(coverageReportPath)) {
              comment += '✅ Coverage report generated successfully!\n\n';
              comment += '**Coverage Details:**\n';
              comment += '- View detailed coverage: [Download Artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';
              comment += '- Minimum Line Coverage: 70%\n';
              comment += '- Minimum Method Coverage: 70%\n';
              comment += '- Minimum Branch Coverage: 60%\n\n';
            } else {
              comment += '⚠️ Coverage report not generated. Check the test results for details.\n\n';
            }

            comment += '**Status:** ';
            if ('${{ job.status }}' === 'success') {
              comment += '✅ All tests passed with sufficient coverage!\n';
            } else {
              comment += '❌ Tests failed or coverage thresholds not met. Please review the logs.\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if Tests Failed
        if: failure()
        run: |
          echo "❌ Tests failed or coverage verification failed!"
          echo "Please ensure all tests pass and meet the minimum coverage requirements:"
          echo "- Line Coverage: 70%"
          echo "- Method Coverage: 70%"
          echo "- Branch Coverage: 60%"
          exit 1
