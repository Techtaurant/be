name: CD Dev - Deploy to Development Server

on:
  pull_request:
    types:
      - closed
    branches:
      - dev

env:
  AWS_REGION: ap-northeast-2

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get ECR repository name from SSM
        run: |
          ECR_REPO=$(aws ssm get-parameter \
            --name "/techtaurant/dev/ECR_REPOSITORY_NAME" \
            --query "Parameter.Value" \
            --output text)
          echo "ECR_REPOSITORY_NAME=$ECR_REPO" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore Gradle build cache
        uses: reproducible-containers/buildkit-cache-dance@v3.1.2
        with:
          cache-map: |
            {
              "gradle-cache": "/root/.gradle"
            }

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_NAME:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_NAME:${{ github.sha }} \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            .

      - name: Fetch env from SSM Parameter Store
        run: |
          aws ssm get-parameters-by-path \
            --path "/techtaurant/dev" \
            --with-decryption \
            --query "Parameters[*].[Name,Value]" \
            --output text | while IFS=$'\t' read -r name value; do
              key=$(echo "$name" | awk -F'/' '{print $NF}')
              echo "${key}=${value}" >> .env
          done
          echo "ECR_REGISTRY=${{ steps.ecr-login.outputs.registry }}" >> .env

      - name: Deploy .env to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEV_SSH_PORT }}
          source: ".env"
          target: "/home/ec2-user/app"

      - name: Pull new image and restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEV_SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/ec2-user/app

            ECR_REGISTRY=$(grep '^ECR_REGISTRY=' .env | cut -d'=' -f2-)
            aws ecr get-login-password --region ap-northeast-2 \
              | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

            docker compose pull app
            docker compose up -d --no-deps app

            echo "Deployment complete. Running containers:"
            docker compose ps
