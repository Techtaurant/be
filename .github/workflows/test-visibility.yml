name: Test Visibility

on:
    pull_request:
        branches:
            - main
            - dev
    push:
        branches:
            - main
            - dev

permissions:
    contents: read
    pull-requests: write

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set Up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: gradle

            - name: Spotless Check
              run: |
                  chmod +x gradlew
                  ./gradlew spotlessCheck

            - name: Run Tests & Generate Coverage Report
              run: |
                  echo "테스트 실행 중... 상세 로그는 artifact에서 확인하세요."
                  chmod +x gradlew
                  ./gradlew test jacocoTestReport -x jacocoTestCoverageVerification --stacktrace > test-output.log 2>&1 || (echo "❌ 테스트 실패! test-output.log를 확인하세요." && cat test-output.log && exit 1)
                  echo "✅ 테스트 성공!"
              env:
                  SPRING_PROFILES_ACTIVE: test

            - name: 테스트 로그 및 리포트 업로드
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-logs-and-reports
                  path: |
                      test-output.log
                      build/reports/jacoco/test/
                      build/test-results/
                  retention-days: 30

            - name: 테스트 커버리지를 PR에 코멘트로 등록
              if: always()
              id: jacoco
              uses: madrapps/jacoco-report@v1.2
              with:
                  title: 📝 테스트 커버리지 리포트입니다
                  paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
                  token: ${{ secrets.GITHUB_TOKEN }}
                  min-coverage-overall: 50
                  min-coverage-changed-files: 50
