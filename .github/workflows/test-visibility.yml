name: Test Visibility

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: techtaurant_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Run Tests & Generate Coverage Report
        working-directory: ./main-server
        run: |
          echo "테스트 실행 중... 상세 로그는 artifact에서 확인하세요."
          chmod +x gradlew
          ./gradlew test jacocoTestReport -x jacocoTestCoverageVerification --stacktrace > test-output.log 2>&1 || (echo "❌ 테스트 실패! test-output.log를 확인하세요." && cat test-output.log && exit 1)
          echo "✅ 테스트 성공!"
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/techtaurant_test
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpass
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
          SPRING_PROFILES_ACTIVE: test

      - name: 테스트 로그 및 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-and-reports
          path: |
            main-server/test-output.log
            main-server/build/reports/jacoco/test/
            main-server/build/test-results/
          retention-days: 30

      - name: 테스트 커버리지를 PR에 코멘트로 등록
        if: always()
        id: jacoco
        uses: madrapps/jacoco-report@v1.2
        with:
          title: 📝 테스트 커버리지 리포트입니다
          paths: ${{ github.workspace }}/main-server/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 50
          min-coverage-changed-files: 50

      - name: 테스트 실패 시 PostgreSQL 로그 확인
        if: failure()
        run: |
          echo "=== PostgreSQL Connection Test ==="
          PGPASSWORD=testpass psql -h localhost -U testuser -d techtaurant_test -c "SELECT 1;" || echo "PostgreSQL connection failed"
          echo "=== Test Results ==="
          find main-server/build/reports/tests -name "*.html" -type f | head -5
