# Pre-commit Hooks 설정
# 각 도구를 구분하기 쉽도록 섹션별로 작성

# ============================================================================
# 1. Ruff - 코드 포맷팅 및 린팅 (Commit 시 실행)
# ============================================================================
# Ruff를 사용하여 코드를 자동으로 포맷팅하고 린트 규칙을 검사합니다.
# commit 시점에 실행되어 코드 스타일을 자동으로 수정합니다.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      # Ruff 포맷터: 코드 스타일 자동 수정
      - id: ruff-format
        name: "🎨 Ruff Format (코드 포맷팅)"
        stages: [pre-commit]
        types: [python]
        args: []

      # Ruff 린터: 코드 품질 검사 및 자동 수정
      - id: ruff
        name: "🔍 Ruff Lint (린팅)"
        stages: [pre-commit]
        types: [python]
        args: [--fix, --exit-non-zero-on-fix]

# ============================================================================
# 2. MyPy - 타입 체크 (Push 시 실행)
# ============================================================================
# MyPy를 사용하여 Python 타입 힌트를 검증합니다.
# push 시점에 실행되며, 타입 오류가 있으면 push가 차단됩니다.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        name: "🔎 MyPy (타입 체크)"
        stages: [pre-push]
        types: [python]
        additional_dependencies:
          - pydantic>=2.9.2
          - pydantic-settings>=2.6.0
          - sqlalchemy>=2.0.35
        args:
          - --config-file=pyproject.toml
          - --strict
        # app/ 디렉토리만 체크
        files: ^app/

# ============================================================================
# 3. Pytest - 단위 테스트 (Push 시 실행)
# ============================================================================
# Pytest를 사용하여 모든 단위 테스트를 실행합니다.
# push 시점에 실행되며, 테스트 실패 시 push가 차단됩니다.
  - repo: local
    hooks:
      - id: pytest
        name: "🧪 Pytest (단위 테스트)"
        entry: pytest
        language: system
        stages: [pre-push]
        types: [python]
        pass_filenames: false
        always_run: true
        args:
          - tests/
          - -v
          - --tb=short

# ============================================================================
# 추가 설정
# ============================================================================
# default_install_hook_types는 설치할 hook 타입을 지정합니다.
# pre-commit과 pre-push 두 가지를 모두 설치합니다.
default_install_hook_types: [pre-commit, pre-push]
